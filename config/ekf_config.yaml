# Frames
world_frame: odom
odom_frame: odom
base_link_frame: base_footprint
map_frame: map

publish_tf: true

# EKF frequency
frequency: 30

sensor_timeout: 0.1

print_diagnostics: true

# ================= IMU =================

imu0: /imu

imu0_config: [false, false, false,   # position
              false, false, false,   # orientation
              false, false, false,   # linear velocity
              true,  true,  true,    # angular velocity
              true,  false, false]   # linear acceleration

imu0_differential: false
imu0_relative: false
imu0_queue_size: 10

imu0_remove_gravitational_acceleration: true

# ================= Visual odometry =================

odom0: /visual_odom

odom0_config: [false, true,  false,   # position (use lateral y only)
               false, false, true,    # orientation (yaw)
               false, false, false,   # linear velocity
               false, false, false,   # angular velocity
               false, false, false]   # acceleration

odom0_differential: false
odom0_relative: true
odom0_queue_size: 5


# ================= Wheel Odometry =================
odom1: /odom_raw

odom1_config: [false, false, false,   # position
               false, false, false,   # orientation
               true,  false, false,   # linear velocity (vx is TRUE!)
               false, false, false,   # angular velocity
               false, false, false]   # acceleration

odom1_differential: false
odom1_relative: false
